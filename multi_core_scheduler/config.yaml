system:
  num_cores: 4
  scheduling_policy: "ml_balanced"  # round_robin, shortest_job, ml_balanced, priority
  time_slice: 100  # milliseconds
  monitoring_interval: 1.0  # seconds

load_balancing:
  imbalance_threshold: 0.3
  migration_cost_factor: 0.1
  min_process_duration: 50
  load_balancing_interval: 2.0

ml:
  model_type: "random_forest"
  retrain_interval: 100
  prediction_horizon: 5
  feature_window_size: 10

gui:
  window_size: [1400, 900]
  update_interval: 0.5
  show_predictions: true
  theme: "dark"
  color_scheme: "blue"

monitoring:
  log_level: "INFO"
  save_metrics: true
  metrics_file: "data/metrics/scheduler_metrics.csv"
  real_time_export: true

simulation:
  auto_generate_processes: true
  process_arrival_rate: 0.5  # processes per second
  max_processes: 1000
  burst_time_range: [50, 500]  # milliseconds
  priority_range: [1, 10]